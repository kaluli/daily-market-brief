# Ejecuta ingest + summarize una vez al día contra la DB de producción (Neon).
# Requiere: secret DATABASE_URL en el repo (misma URL que usa la API en Vercel).
name: Daily ingest and summarize

on:
  schedule:
    # 13:00 UTC (9:00 Argentina) — permite tener noticias del día
    - cron: "0 13 * * *"
  workflow_dispatch: # Permite ejecutar manualmente desde la pestaña Actions

jobs:
  ingest-summarize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: apps/api/go.sum

      - name: Ingest news
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: make ingest
        working-directory: .

      - name: Summarize today
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: make summarize
        working-directory: .

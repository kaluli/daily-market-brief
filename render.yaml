# Render Blueprint: API (Go) + PostgreSQL
# Conectar el repo en dashboard.render.com y desplegar con este blueprint.
# Plan gratuito: Web Service se duerme tras inactividad; Postgres tiene tier free con límites.

databases:
  - name: daily-market-brief-db
    databaseName: marketbrief
    user: marketbrief
    plan: free  # Tier gratuito (límites de uso)

services:
  - type: web
    name: daily-market-brief-api
    runtime: docker
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: daily-market-brief-db
          property: connectionString
      # PORT lo inyecta Render automáticamente
      - key: CONFIG_DIR
        value: /app/config
      - key: SUMMARIES_PATH
        value: /app/summaries
